name: Build Windows EXE with Nuitka

# This workflow will run every time you push to the 'main' branch
# and can also be triggered manually from the GitHub Actions tab.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    # This is the magic line: it tells GitHub to run this on a Windows Server VM
    runs-on: windows-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Change this to match your target Python version
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Added zstandard to fix the compression warning
        pip install zstandard nuitka
    - name: Compile with Nuitka
      run: |
        # Added assume-yes and the tk-inter plugin
        python -m nuitka --assume-yes-for-downloads --enable-plugin=tk-inter --standalone --onefile maths_notes.py
      - name: Upload the EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        # Nuitka will output an .exe with the same name as your script
        path: maths_notes.exe
